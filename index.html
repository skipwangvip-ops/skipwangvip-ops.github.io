<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>阅读大冒险 · 我的书架</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(180deg,#1a1f3c 0%,#2b2350 60%,#3a2c5e 100%);color:#f3efe4;min-height:100vh;padding:26px 18px 50px}
  .wrap{max-width:760px;margin:0 auto}
  .head{text-align:center;margin:12px 0 6px}
  .head .bolt{font-size:44px}
  h1{font-size:26px;margin-top:6px;background:linear-gradient(90deg,#ffe082,#a5ffb0,#8ecfff);
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:#bfb8d9;font-size:14px;margin-top:6px}
  .kid{text-align:center;margin:14px 0 0;color:#e8e2ff;font-size:15px}
  .kid b{color:#ffd54f}
  .kid a{color:#8ecfff;font-size:13px;margin-left:8px;text-decoration:none}
  .stats{display:flex;gap:10px;margin:16px 0 6px}
  .stat{flex:1;background:#262148;border:1px solid #443b74;border-radius:16px;padding:14px 8px;text-align:center}
  .stat .n{font-size:24px;font-weight:800;color:#ffd54f}
  .stat .l{font-size:12px;color:#a79fce;margin-top:4px}
  .shelf-title{font-size:16px;font-weight:800;color:#ffd54f;margin:24px 0 4px}
  .book{display:block;background:#262148;border:1px solid #443b74;border-radius:18px;padding:16px 18px;
    margin:12px 0;text-decoration:none;color:#f3efe4;position:relative;transition:transform .12s}
  .book:active{transform:scale(.99)}
  .book .row{display:flex;align-items:center;gap:14px}
  .book .cover{font-size:34px;width:48px;text-align:center}
  .book .info{flex:1;min-width:0}
  .book .bt{font-size:18px;font-weight:800}
  .book .bd{font-size:13px;color:#a79fce;margin-top:3px}
  .book .go{font-size:20px;color:#ffd54f}
  .book .pwrap{background:#1c1838;border-radius:8px;height:10px;margin-top:12px;overflow:hidden}
  .book .pbar{height:100%;background:linear-gradient(90deg,#66bb6a,#ffd54f);border-radius:8px}
  .book .pl{font-size:12px;color:#a79fce;margin-top:5px;display:flex;justify-content:space-between}
  .book .done-badge{position:absolute;top:14px;right:16px;font-size:13px;color:#2b1a00;background:#ffd54f;
    border-radius:20px;padding:3px 10px;font-weight:800}
  .foot{text-align:center;color:#8d84b8;font-size:12px;margin-top:26px;line-height:1.8}
</style>
<meta name="robots" content="noindex, nofollow">
<style>
 #site-gate{position:fixed;inset:0;z-index:99999;background:linear-gradient(180deg,#1a1f3c,#2b2350);display:flex;align-items:center;justify-content:center;font-family:-apple-system,"PingFang SC",sans-serif}
 #site-gate .sg-box{text-align:center;color:#f3efe4;padding:24px}
 #site-gate .sg-t{font-size:22px;font-weight:800;margin-top:10px;color:#ffd54f}
 #site-gate .sg-s{color:#bfb8d9;font-size:14px;margin:8px 0 18px}
 #site-gate input{display:block;margin:0 auto;width:220px;max-width:70vw;padding:13px 16px;border-radius:14px;border:1px solid #4c4380;background:#262148;color:#f3efe4;font-size:17px;text-align:center;outline:none}
 #site-gate button{margin-top:14px;padding:13px 30px;border:none;border-radius:14px;font-size:16px;font-weight:800;background:linear-gradient(90deg,#ffb300,#ff8f00);color:#2b1a00;cursor:pointer}
 #site-gate .sg-m{color:#ff8a80;min-height:20px;margin-top:10px;font-size:14px}
</style>
</head>
<body>
<div id="site-gate"><div class="sg-box"><div style="font-size:44px">🔒📖</div>
<div class="sg-t">阅读大冒险</div><div class="sg-s">请输入密码开始阅读</div>
<input id="sg-pw" type="password" autocomplete="off" placeholder="密码"/>
<button id="sg-btn">进入 ▶</button><div class="sg-m" id="sg-m"></div></div></div>
<script>(function(){function H(s){var x=5381;for(var i=0;i<s.length;i++)x=((x*33)^s.charCodeAt(i))>>>0;return x;}var T=2088000572,g=document.getElementById("site-gate");if(localStorage.getItem("rg_gate")==="ok"){g.style.display="none";return;}function t(){var v=(document.getElementById("sg-pw").value||"").trim().toLowerCase();if(H(v)===T){localStorage.setItem("rg_gate","ok");g.style.display="none";}else{document.getElementById("sg-m").textContent="密码不对，再试一次~";}}document.getElementById("sg-btn").onclick=t;document.getElementById("sg-pw").addEventListener("keydown",function(e){if(e.key==="Enter")t();});setTimeout(function(){try{document.getElementById("sg-pw").focus();}catch(e){}},100);})();</script>
<div class="wrap">
  <div class="head">
    <div class="bolt">📚✨</div>
    <h1>阅读大冒险</h1>
    <div class="sub">读英文原著 · 闯关 · 收集 · 成长</div>
  </div>

  <div id="shared-banner" style="display:none;background:#33295c;border:1px solid #ffd54f;border-radius:12px;padding:10px 14px;margin:0 0 12px;color:#ffe082;text-align:center;font-size:14px"></div>

  <div class="kid" id="kid"></div>

  <div class="stats">
    <div class="stat"><div class="n" id="s-words">0</div><div class="l">累计已读词数</div></div>
    <div class="stat"><div class="n" id="s-streak">0</div><div class="l">🔥 连读天数</div></div>
    <div class="stat"><div class="n" id="s-books">0</div><div class="l">读完的书</div></div>
  </div>

  <div id="parent-tools" style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0 4px">
    <button class="ptbtn" onclick="toggleReport()">👨‍👩‍👧 家长看进度</button>
    <button class="ptbtn" onclick="shareLink()">📤 分享给家长</button>
    <button class="ptbtn" onclick="backupMenu()">💾 备份 / 恢复</button>
  </div>

  <div id="report" style="display:none"></div>

  <div class="shelf-title">📖 我的书架</div>
  <div id="shelf"></div>

  <div class="foot">
    进度和成绩存在这台设备上 · 每天读一章，看着数字越变越大 💪<br>
    换设备或清了浏览器会重新开始（可用“💾 备份”导出保存）
  </div>
</div>
<style>
 .ptbtn{background:#2e2856;border:1px solid #4c4380;color:#e8e2ff;border-radius:12px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit}
 .ptbtn:active{transform:scale(.97)}
 #report .rp-card{background:#262148;border:1px solid #443b74;border-radius:16px;padding:14px 16px;margin:10px 0}
 #report .rp-h{font-size:15px;font-weight:800;color:#ffd54f;margin-bottom:8px}
 #report table{width:100%;border-collapse:collapse;font-size:13px}
 #report th,#report td{text-align:left;padding:6px 4px;border-bottom:1px solid #3a3363}
 #report th{color:#a79fce;font-weight:700}
 #report td.num{color:#ffd54f;font-weight:700;text-align:right}
 #report .rp-tot{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
 #report .rp-tot div{flex:1;min-width:80px;background:#1c1838;border-radius:12px;padding:10px;text-align:center}
 #report .rp-tot b{display:block;font-size:20px;color:#ffd54f}
 #report .rp-tot span{font-size:11px;color:#a79fce}
</style>

<script>
/* 书架书目(新增书就往这里加一项) */
const BOOKS = [
  { id:"frankenstein", path:"./frankenstein/", cover:"⚡", title:"Frankenstein 科学怪人",
    desc:"科幻 · 造出生命的科学家与他的怪物", saveKey:"frankenstein_game_v2", chapters:26, words:13740 },
  { id:"moonstone", path:"./moonstone/", cover:"💎", title:"The Moonstone 月亮石",
    desc:"侦探 · 一颗印度圣钻在生日夜离奇失窃", saveKey:"moonstone_game_v1", chapters:9, words:11607 },
  { id:"silasmarner", path:"./silasmarner/", cover:"🧶", title:"Silas Marner 织工马南",
    desc:"温暖 · 织工丢了金子，却捡回一个金发女孩", saveKey:"silasmarner_game_v1", chapters:11, words:12800 },
  { id:"robinson", path:"./robinson/", cover:"🏝", title:"Robinson Crusoe 鲁滨逊漂流记",
    desc:"冒险 · 一个人的荒岛求生28年", saveKey:"robinson_game_v1", chapters:6, words:13844 },
  { id:"wuthering", path:"./wuthering/", cover:"🌩", title:"Wuthering Heights 呼啸山庄",
    desc:"哥特 · 荒原上的爱、恨与命运（题材较沉重）", saveKey:"wuthering_game_v1", chapters:18, words:25364 },
  { id:"faustus", path:"./faustus/", cover:"📜", title:"Dr Faustus 浮士德的悲剧",
    desc:"警世 · 为知识把灵魂卖给魔鬼（题材较沉重）", saveKey:"faustus_game_v1", chapters:9, words:8768 },
  { id:"xfiles", path:"./xfiles/", cover:"🔦", title:"X-Files: Squeeze X档案之突变异种",
    desc:"惊悚 · FBI探员追捕变异凶手（较吓人）", saveKey:"xfiles_game_v1", chapters:10, words:7070 },
  { id:"charlie", path:"./charlie/", cover:"🍫", title:"Charlie & the Chocolate Factory 查理和巧克力工厂",
    desc:"欢乐 · 金奖券开启的巧克力工厂奇遇（放心给娃）", saveKey:"charlie_game_v1", chapters:29, words:32000 },
  { id:"sherlock", path:"./sherlock/", cover:"🔍", title:"Sherlock Holmes 福尔摩斯探案记",
    desc:"侦探 · 福尔摩斯的三个推理故事（放心给娃）", saveKey:"sherlock_game_v1", chapters:6, words:9715 },
  { id:"jekyll", path:"./jekyll/", cover:"🎭", title:"Dr Jekyll & Mr Hyde 化身博士",
    desc:"哥特惊悚 · 善良医生的邪恶另一面（你把关·扫描版或有个别错字）", saveKey:"jekyll_game_v1", chapters:8, words:12059 },
];
const HUB_KEY="reading_hub_v1";
function hub(){ try{return JSON.parse(localStorage.getItem(HUB_KEY))||{}}catch(e){return{}} }
function load(k){ try{return JSON.parse(localStorage.getItem(k))||{}}catch(e){return{}} }

function render(){
  const h=hub();
  // 名字
  const name=h.kidName||"";
  document.getElementById("kid").innerHTML = name
    ? `👦 <b>${name}</b> 的阅读成绩单 <a href="javascript:setName()">改名</a>`
    : `<a href="javascript:setName()" style="color:#ffd54f">✏️ 写上名字，生成你的阅读成绩单</a>`;
  // 跨书总词数
  let tw=0; const hw=h.words||{};
  for(const b in hw) for(const c in hw[b]) tw+=hw[b][c]||0;
  document.getElementById("s-words").textContent=tw;
  const streak=(h.streak&&h.streak.count)||0;
  document.getElementById("s-streak").textContent=streak;

  let doneBooks=0;
  const shelf=document.getElementById("shelf"); shelf.innerHTML="";
  BOOKS.forEach(b=>{
    const s=load(b.saveKey);
    const doneN=Object.keys(s.done||{}).length;
    const pct=Math.round(doneN/b.chapters*100);
    const finished=doneN>=b.chapters;
    if(finished) doneBooks++;
    const a=document.createElement("a");
    a.className="book"; a.href=b.path;
    a.innerHTML=`
      ${finished?'<div class="done-badge">🏅 已通关</div>':''}
      <div class="row">
        <div class="cover">${b.cover}</div>
        <div class="info"><div class="bt">${b.title}</div><div class="bd">${b.desc}</div></div>
        <div class="go">▶</div>
      </div>
      <div class="pwrap"><div class="pbar" style="width:${pct}%"></div></div>
      <div class="pl"><span>${doneN>0?(finished?'读完啦 🎉':'继续读'):'开始阅读'}</span><span>${doneN}/${b.chapters} 章 · ${pct}%</span></div>`;
    shelf.appendChild(a);
  });
  document.getElementById("s-books").textContent=doneBooks+"/"+BOOKS.length;
}
function setName(){
  const h=hub(); const n=prompt("写上你的名字：", h.kidName||"");
  if(n!=null){ h.kidName=n.trim().slice(0,16); localStorage.setItem(HUB_KEY,JSON.stringify(h)); render(); }
}

/* ===== 汇总本设备进度成一份快照 ===== */
function collectSnapshot(){
  const h=hub();
  let tw=0; const hw=h.words||{};
  for(const b in hw) for(const c in hw[b]) tw+=hw[b][c]||0;
  const books=BOOKS.map(b=>{
    const s=load(b.saveKey);
    const doneN=Object.keys(s.done||{}).length;
    const stars=Object.values(s.stars||{}).reduce((a,x)=>a+(x||0),0);
    const vocab=Object.keys(s.words||{}).length;
    return {id:b.id,t:b.title,done:doneN,total:b.chapters,stars,vocab};
  });
  const vocabTotal=books.reduce((a,x)=>a+x.vocab,0);
  const d=new Date();
  return {name:h.kidName||"小读者",words:tw,streak:(h.streak&&h.streak.count)||0,
          best:(h.streak&&h.streak.best)||0,books,vocabTotal,
          date:d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()};
}
/* ===== 家长详细报告 ===== */
let _reportOn=false;
function toggleReport(){ _reportOn=!_reportOn; renderReport(SHARED||collectSnapshot()); document.getElementById("report").style.display=_reportOn?"block":"none"; }
function renderReport(s){
  const rows=s.books.map(b=>{
    const pct=Math.round(b.done/b.total*100);
    return `<tr><td>${b.t}</td><td class="num">${b.done}/${b.total}</td><td class="num">${pct}%</td><td class="num">⭐${b.stars}</td><td class="num">${b.vocab}词</td></tr>`;
  }).join("");
  document.getElementById("report").innerHTML=
    `<div class="rp-card">
       <div class="rp-h">👦 ${s.name} 的阅读报告 <span style="color:#a79fce;font-weight:400;font-size:12px">· ${s.date}</span></div>
       <div class="rp-tot">
         <div><b>${s.words}</b><span>累计已读词</span></div>
         <div><b>${s.streak}</b><span>🔥当前连读</span></div>
         <div><b>${s.best||s.streak}</b><span>最长连读</span></div>
         <div><b>${s.vocabTotal}</b><span>收集生词</span></div>
       </div>
       <table><tr><th>书</th><th style="text-align:right">进度</th><th style="text-align:right">完成</th><th style="text-align:right">星</th><th style="text-align:right">生词</th></tr>${rows}</table>
     </div>`;
}
/* ===== 分享给家长(快照编码进链接) ===== */
function b64e(o){ return btoa(unescape(encodeURIComponent(JSON.stringify(o)))); }
function b64d(s){ return JSON.parse(decodeURIComponent(escape(atob(s)))); }
function shareLink(){
  const url=location.origin+location.pathname+"#r="+b64e(collectSnapshot());
  const done=()=>{ prompt("把这条链接发给家长，TA打开就能看到孩子的阅读报告(需要密码 joey)：", url); };
  if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=>{ alert("链接已复制！发给家长即可(打开需密码 joey)"); }, done); }
  else done();
}
/* ===== 备份 / 恢复(防清浏览器丢失) ===== */
function backupMenu(){
  const c=confirm("点【确定】导出备份码(换设备/清浏览器前保存好)；点【取消】去恢复(粘入之前的备份码)。");
  if(c){
    const all={}; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k===HUB_KEY||k.endsWith("_game_v1")||k.endsWith("_game_v2")) all[k]=localStorage.getItem(k); }
    prompt("这是你的备份码，复制保存好。以后在新设备点“恢复”粘进去即可：", b64e(all));
  } else {
    const code=prompt("把之前的备份码粘到这里，恢复所有进度：","");
    if(code){ try{ const all=b64d(code.trim()); for(const k in all) localStorage.setItem(k,all[k]); alert("恢复成功！"); render(); }catch(e){ alert("备份码无效，请检查"); } }
  }
}
/* ===== 家长查看模式(打开分享链接) ===== */
let SHARED=null;
function showSharedView(){
  if(!location.hash.startsWith("#r=")) return false;
  try{ SHARED=b64d(location.hash.slice(3)); }catch(e){ return false; }
  document.getElementById("shared-banner").style.display="block";
  document.getElementById("shared-banner").innerHTML="👨‍👩‍👧 家长查看模式 · 这是 <b>"+SHARED.name+"</b> 分享的阅读报告快照";
  document.getElementById("kid").style.display="none";
  document.getElementById("parent-tools").style.display="none";
  // 用快照渲染顶部统计
  document.getElementById("s-words").textContent=SHARED.words;
  document.getElementById("s-streak").textContent=SHARED.streak;
  document.getElementById("s-books").textContent=SHARED.books.filter(b=>b.done>=b.total).length+"/"+SHARED.books.length;
  _reportOn=true; renderReport(SHARED); document.getElementById("report").style.display="block";
  document.querySelector(".shelf-title").textContent="📖 各书进度(只读)";
  // 书架显示只读进度
  const shelf=document.getElementById("shelf"); shelf.innerHTML="";
  SHARED.books.forEach(b=>{
    const pct=Math.round(b.done/b.total*100), fin=b.done>=b.total;
    const d=document.createElement("div"); d.className="book"; d.style.cursor="default";
    d.innerHTML=`${fin?'<div class="done-badge">🏅 已通关</div>':''}<div class="row"><div class="info"><div class="bt">${b.t}</div></div></div>
      <div class="pwrap"><div class="pbar" style="width:${pct}%"></div></div>
      <div class="pl"><span>⭐${b.stars} · ${b.vocab}词</span><span>${b.done}/${b.total}章 · ${pct}%</span></div>`;
    shelf.appendChild(d);
  });
  return true;
}

if(!showSharedView()) render();
</script>
</body>
</html>
